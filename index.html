<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIGA 2 ESOA - GLOBAL SYNC</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { height:100vh; background:#0a0a14; color:#e0e0ff; font-family:Arial, sans-serif; overflow:hidden; font-size: 0.9rem; }
        .header { text-align:center; padding:10px; font-size:2.5rem; font-weight:bold; color:#ff00ea; text-shadow:0 0 20px #ff00ea; letter-spacing:10px; }
        
        @media (max-width: 600px) {
            .header { font-size: 1.5rem; letter-spacing: 5px; padding-top: 40px; }
        }

        .top-nav { text-align: center; margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        .plantilla-main-btn { background: #ff00ea; color: white; padding: 8px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 0 15px #ff00ea66; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; }
        .plantilla-main-btn:hover { transform: scale(1.1); box-shadow: 0 0 25px #ff00ea; }
        
        .watermark { position: fixed; top: 10px; left: 10px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.2); z-index: 5; pointer-events: none; font-weight: bold; text-transform: uppercase; }

        .phone-btn { background: #00e5ff; color: #000; box-shadow: 0 0 15px #00e5ff66; }
        .phone-btn:hover { box-shadow: 0 0 25px #00e5ff; }

        .container { display:grid; grid-template-columns: repeat(4, 1fr); height:calc(100vh - 120px); gap:15px; padding:20px; transition: 0.5s; }
        .container.mobile-mode { display: flex; flex-direction: column; height: calc(100vh - 120px); overflow-y: auto; padding: 10px; }
        .container.mobile-mode .panel { min-height: 400px; margin-bottom: 15px; flex-shrink: 0; }

        .panel { background:rgba(20,20,40,0.8); border:1px solid #ff00ea44; border-radius:15px; padding:15px; position:relative; display:flex; flex-direction:column; backdrop-filter: blur(10px); height: 100%; overflow: hidden; }
        .panel-title { text-align:center; color:#ff00ea; font-size:1.2rem; margin-bottom:15px; font-weight:bold; text-transform: uppercase; }
        
        .data-box { flex-grow:1; background:rgba(0,0,0,0.3); border-radius:10px; overflow-y:auto; padding:10px; border: 1px solid rgba(255, 0, 234, 0.1); }
        .data-box::-webkit-scrollbar { width: 6px; }
        .data-box::-webkit-scrollbar-thumb { background: #ff00ea; border-radius: 10px; }

        .clausulazo-item { background: rgba(255, 255, 255, 0.03); margin-bottom: 10px; padding: 10px; border-left: 4px solid #ff00ea; border-radius: 4px; }
        .edit-btn { position:absolute; top:10px; right:10px; cursor:pointer; font-size:1rem; display:none; opacity:0.5; z-index: 10; transition: 0.3s; }
        .edit-btn:hover { opacity:1; transform: scale(1.2); }
        
        .player-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .player-card { background: #1a237e; border-radius: 10px; padding: 12px; text-align: center; border-bottom: 4px solid #ff00ea; position: relative; min-height: 90px; display: flex; flex-direction: column; justify-content: center; }
        .player-name { font-weight: bold; font-size: 0.75rem; color: white; text-transform: uppercase; }
        .player-goals-count { font-size: 0.7rem; color: #ff00ea; font-weight: bold; }
        .captain-tag { color: #ffcc00; font-size: 0.6rem; font-weight: bold; letter-spacing: 1px; margin-top: 2px; }
        
        .player-admin-tools { position: absolute; top: 5px; right: 5px; display: none; }
        .btn-p-edit { color: #00e5ff; font-size: 0.65rem; cursor: pointer; margin-left: 5px; }
        .btn-p-del { color: #ff4444; font-size: 0.65rem; cursor: pointer; margin-left: 5px; }

        .team-select-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #ff00ea; color: white; padding: 12px; margin: 8px 0; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        
        table { width:100%; border-collapse:collapse; font-size:0.75rem; }
        th { color:#ff00ea; border-bottom:1px solid #ff00ea44; padding:6px; position: sticky; top: 0; background: #141428; z-index: 5; }
        td { padding:8px; text-align:center; border-bottom:1px solid #ffffff05; }
        
        .admin-controls { display: none; margin-left: 5px; }
        .btn-mini { background: none; border: none; cursor: pointer; font-size: 0.75rem; padding: 2px; display: inline-block; margin: 0 2px; }
        .btn-del { color: #ff4444; }
        .btn-edit { color: #00e5ff; }
        .dinero-txt { color: #00ff88; font-weight: bold; }

        .form-dots { display: flex; justify-content: center; gap: 4px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: white; }
        .dot-v { background: #28a745; }
        .dot-d { background: #dc3545; }
        .dot-e { background: #6c757d; }
        .dot:last-child { border: 2px solid white; box-shadow: 0 0 5px white; }

        /* ОКНО ¿QUIÉN ERES? - СТИЛЬ ИЗ СКРИНШОТА */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:#1a1a2e; padding:30px; border:2px solid #ff00ea; border-radius:25px; width:550px; text-align:center; box-shadow: 0 0 30px #ff00ea66; max-height: 85vh; overflow-y: auto; }
        
        input, textarea { width:100%; padding:10px; margin:8px 0; background:#0a0a14; border:1px solid #ff00ea44; color:white; border-radius:8px; }
        button { width:100%; padding:12px; background:#ff00ea; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:8px; margin-top:10px; }
        
        .top-right-tools { position: fixed; top: 10px; right: 10px; display: flex; gap: 10px; align-items: center; z-index: 20; }
        .tool-icon { cursor: pointer; font-size: 1.3rem; opacity: 0.3; transition: 0.3s; }
        .tool-icon:hover { opacity: 1; transform: scale(1.1); }

        .names-cloud { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 20px; }
        .name-chip { font-size: 0.75rem; background: rgba(255,0,234,0.1); padding: 5px 12px; border-radius: 15px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,0,234,0.3); color: white; font-weight: bold; }
        .name-chip:hover { background: #ff00ea; transform: scale(1.1); }

        .log-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #ffffff11; font-size: 0.75rem; text-align: left; }
        #btn-logs-header { display: none; background: #7000ff; color: white; padding: 4px 12px; border-radius: 10px; font-size: 0.65rem; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="watermark">Hecho por Vadym</div>
    
    <div class="top-right-tools">
        <button id="btn-logs-header" onclick="openModal('logs-modal')">LOGS</button>
        <div class="tool-icon" onclick="openModal('auth-modal')" title="Admin Login">🔐</div>
    </div>

    <div class="header">BIENVENIDOS</div>

    <div class="top-nav">
        <button id="toggle-view-btn" class="plantilla-main-btn phone-btn" onclick="toggleView()">MODO MÓVIL</button>
        <button class="plantilla-main-btn" onclick="openModal('plantillas-modal')">PLANTILLA</button>
    </div>

    <div class="container" id="main-container">
        <div class="panel"><div class="edit-btn" onclick="clearModal('goleadores-modal')">✏️</div><div class="panel-title">TOP GOLEADORES</div><div class="data-box" id="goleadores-table"></div></div>
        <div class="panel"><div class="edit-btn" onclick="clearModal('calendario-modal')">✏️</div><div class="panel-title">CALENDARIO</div><div class="data-box" id="calendario-table"></div></div>
        <div class="panel"><div class="edit-btn" onclick="clearModal('clausulazos-modal')">✏️</div><div class="panel-title">CLAUSULAZOS</div><div class="data-box" id="clausulazos-list"></div></div>
        <div class="panel"><div class="edit-btn" onclick="clearModal('clasificacion-modal')">✏️</div><div class="panel-title">CLASIFICACIÓN</div><div class="data-box" id="clasificacion-table"></div></div>
    </div>

    <div id="welcome-modal" class="modal">
        <div class="modal-content">
            <h1 style="color:#ff00ea; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px;">¿QUIÉN ERES?</h1>
            <div id="all-players-list" class="names-cloud"></div>
            <p style="font-size: 0.7rem; color: #777; margin-top: 20px;">Selecciona tu nombre para continuar</p>
        </div>
    </div>

    <div id="logs-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:#00e5ff;">LOGS DE ACCESO</h2>
            <div id="logs-list" class="data-box" style="margin-top:20px; max-height:400px;"></div>
            <button onclick="closeModals()">CERRAR</button>
        </div>
    </div>

    <div id="plantillas-modal" class="modal"><div class="modal-content"><h2 style="color:#ff00ea; margin-bottom:20px;">EQUIPOS</h2><button class="team-select-btn" onclick="showTeam('Pingüinos Locos')">Pingüinos Locos</button><button class="team-select-btn" onclick="showTeam('Atlético de Jhonsy')">Atlético de Jhonsy</button><button class="team-select-btn" onclick="showTeam('Pajillas')">Pajillas</button><button style="background:transparent; border:1px solid grey; margin-top:20px;" onclick="closeModals()">CERRAR</button></div></div>
    <div id="team-list-modal" class="modal"><div class="modal-content"><h2 id="team-name-title" style="color:#ff00ea; text-transform: uppercase;"></h2><div id="admin-team-controls" style="display:none; margin-bottom:10px;"><button onclick="addPlayerPrompt()" style="padding:5px; font-size:0.7rem; width:auto; background:#00e5ff;">+ AÑADIR JUGADOR</button></div><div id="players-list-content" class="player-grid"></div><button style="margin-top:20px; background: #333;" onclick="openModal('plantillas-modal')">VOLVER</button></div></div>
    <div id="auth-modal" class="modal"><div class="modal-content"><h3>ADMIN LOGIN</h3><input type="text" id="user" placeholder="Usuario"><input type="password" id="pass" placeholder="Contraseña"><button onclick="login()">ENTRAR</button><button onclick="closeModals()">CERRAR</button></div></div>
    <div id="error-modal" class="modal" onclick="closeModals()"><div class="modal-content"><div style="color:red; font-weight:bold;">Q NO ENTRES CABROONNN</div><button>CERRAR</button></div></div>
    
    <div id="calendario-modal" class="modal"><div class="modal-content"><h3 id="cal-title">AÑADIR PARTIDO</h3><input type="hidden" id="cal-index"><input type="text" id="cal-e1" placeholder="EQUIPO 1"><input type="text" id="cal-e2" placeholder="EQUIPO 2"><input type="text" id="cal-hora" placeholder="DIA Y HORA"><button onclick="saveData('calendario')">GUARDAR</button><button onclick="closeModals()">CERRAR</button></div></div>
    <div id="clausulazos-modal" class="modal"><div class="modal-content"><h3 id="cl-title">NUEVO CLAUSULAZO</h3><input type="hidden" id="cl-index"><textarea id="cl-text" rows="4" placeholder="Escribe el clausulazo..."></textarea><button onclick="saveData('clausulazos')">PUBLICAR</button><button onclick="closeModals()">CERRAR</button></div></div>
    <div id="goleadores-modal" class="modal"><div class="modal-content"><h3 id="g-title">AÑADIR JUGADOR</h3><input type="hidden" id="g-index"><input type="text" id="g-name" placeholder="NOMBRE"><input type="number" id="g-goals" placeholder="GOLES"><input type="number" id="g-pj" placeholder="PJ"><button onclick="saveData('goleadores')">GUARDAR</button><button onclick="closeModals()">CERRAR</button></div></div>
    <div id="clasificacion-modal" class="modal"><div class="modal-content"><h3 id="c-title">AÑADIR EQUIPO</h3><input type="hidden" id="c-index"><input type="text" id="c-team" placeholder="EQUIPO"><input type="number" id="c-pj" placeholder="PJ"><input type="number" id="c-pts" placeholder="PUNTOS"><input type="text" id="c-money" placeholder="DINERO"><input type="text" id="c-form" placeholder="ÚLTIMOS 5 (Ej: VVDEV)"> <button onclick="saveData('clasificacion')">GUARDAR</button><button onclick="closeModals()">CERRAR</button></div></div>

    <script>
        const BIN_ID = '69a1d862ae596e708f5006cd'; 
        const API_KEY = '$2a$10$.NLuB1Db9xzsid6tI3pxOu9Z59ibyaa5h74.q26Iik5b0DZVu/DS.'; 
        const URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let globalData = { goleadores: [], clasificacion: [], clausulazos: [], calendario: [], teams: {}, accessLogs: [] };
        let isAdmin = false;
        let currentOpenTeam = "";
        const captains = ["Enol", "Moreno", "Carlos Fernández"];

        // ФУНКЦИЯ ПРОВЕРКИ И ВЫВОДА ОКНА ВХОДА
        function showWelcomeScreen() {
            // Если имя уже сохранено, не показываем
            if (localStorage.getItem('user_name')) return;
            
            let allNames = [];
            Object.values(globalData.teams).forEach(team => {
                team.forEach(p => allNames.push(p.n));
            });
            
            // Если база пуста, добавим примеры
            if (allNames.length === 0) allNames = ["Invitado", "Andrés", "JAVI", "MARC"];
            
            let html = "";
            [...new Set(allNames)].sort().forEach(name => {
                html += `<div class="name-chip" onclick="saveUserSession('${name}')">${name}</div>`;
            });
            document.getElementById('all-players-list').innerHTML = html;
            openModal('welcome-modal');
        }

        async function saveUserSession(name) {
            localStorage.setItem('user_name', name);
            const now = new Date();
            const timeStr = now.toLocaleDateString() + " " + now.toLocaleTimeString();
            
            if(!globalData.accessLogs) globalData.accessLogs = [];
            globalData.accessLogs.unshift({ name: name, time: timeStr });
            
            if(globalData.accessLogs.length > 100) globalData.accessLogs.pop();
            
            closeModals();
            await sync();
        }

        function renderLogs() {
            if (!globalData.accessLogs) return;
            let html = "";
            globalData.accessLogs.forEach(log => {
                html += `<div class="log-item"><span><b>${log.name}</b></span> <span style="color:#00e5ff;">${log.time}</span></div>`;
            });
            document.getElementById('logs-list').innerHTML = html || "No hay registros";
        }

        function login() {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            if(u === '67' && p === '123456') { 
                isAdmin = true; 
                document.querySelectorAll('.edit-btn').forEach(b => b.style.display = 'block'); 
                document.getElementById('btn-logs-header').style.display = 'block';
                render(); 
                renderLogs();
                closeModals();
            } 
            else { closeModals(); openModal('error-modal'); }
        }

        async function loadData() {
            try {
                const res = await fetch(URL, { headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': false }});
                const data = await res.json();
                if (data) { 
                    globalData = data; 
                    render(); 
                    if(currentOpenTeam) renderTeamPlayers(); 
                    showWelcomeScreen(); // Показываем окно входа если нужно
                    if(isAdmin) renderLogs();
                }
            } catch (e) { console.error("Error loading"); }
        }

        async function sync() { await fetch(URL, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY }, body: JSON.stringify(globalData) }); }

        function showTeam(name) {
            currentOpenTeam = name;
            document.getElementById('team-name-title').innerText = name;
            document.getElementById('admin-team-controls').style.display = isAdmin ? 'block' : 'none';
            renderTeamPlayers(); openModal('team-list-modal');
        }

        function renderTeamPlayers() {
            let players = globalData.teams[currentOpenTeam] || [];
            players.sort((a, b) => (captains.includes(b.n) ? 1 : 0) - (captains.includes(a.n) ? 1 : 0));
            let html = "";
            players.forEach((p, idx) => {
                const isCap = captains.includes(p.n);
                html += `<div class="player-card">
                    <div class="player-admin-tools" style="display:${isAdmin ? 'block' : 'none'}">
                        <span class="btn-p-edit" onclick="editPlayer(${idx})">✎</span>
                        <span class="btn-p-del" onclick="deletePlayer(${idx})">✖</span>
                    </div>
                    <div class="player-name">${p.n}</div>
                    ${isCap ? '<div class="captain-tag">CAPITÁN</div>' : ''}
                    <div class="player-goals-count">${p.g} GOLES</div>
                </div>`;
            });
            document.getElementById('players-list-content').innerHTML = html;
        }

        function editPlayer(idx) {
            const p = globalData.teams[currentOpenTeam][idx];
            const n = prompt("Nombre:", p.n), g = prompt("Goles:", p.g);
            if (n !== null) p.n = n; if (g !== null) p.g = parseInt(g);
            renderTeamPlayers(); sync();
        }

        function deletePlayer(idx) { if(confirm("¿?")) { globalData.teams[currentOpenTeam].splice(idx, 1); renderTeamPlayers(); sync(); } }
        function addPlayerPrompt() { const n = prompt("Nombre:"); if(n) { if(!globalData.teams[currentOpenTeam]) globalData.teams[currentOpenTeam]=[]; globalData.teams[currentOpenTeam].push({n: n, g: 0}); renderTeamPlayers(); sync(); } }

        function openEditModal(type, index) {
            const item = globalData[type][index];
            if (type === 'goleadores') {
                document.getElementById('g-index').value = index; document.getElementById('g-name').value = item.name;
                document.getElementById('g-goals').value = item.goals; document.getElementById('g-pj').value = item.pj;
                openModal('goleadores-modal');
            } else if (type === 'clasificacion') {
                document.getElementById('c-index').value = index; document.getElementById('c-team').value = item.team;
                document.getElementById('c-pts').value = item.pts; document.getElementById('c-pj').value = item.pj;
                document.getElementById('c-money').value = item.money; document.getElementById('c-form').value = item.form || ""; 
                openModal('clasificacion-modal');
            } else if (type === 'calendario') {
                document.getElementById('cal-index').value = index; document.getElementById('cal-e1').value = item.e1;
                document.getElementById('cal-e2').value = item.e2; document.getElementById('cal-hora').value = item.hora;
                openModal('calendario-modal');
            } else if (type === 'clausulazos') {
                document.getElementById('cl-index').value = index; document.getElementById('cl-text').value = item.body;
                openModal('clausulazos-modal');
            }
        }

        function clearModal(id) { document.querySelectorAll(`#${id} input, #${id} textarea`).forEach(i => i.value = ""); openModal(id); }

        async function saveData(type) {
            let pre = (type === 'goleadores' ? 'g' : type === 'clasificacion' ? 'c' : type === 'calendario' ? 'cal' : 'cl');
            let idx = document.getElementById(pre + '-index').value, item = (idx !== "") ? globalData[type][idx] : {};
            if (type === 'goleadores') { item.name = document.getElementById('g-name').value; item.goals = parseInt(document.getElementById('g-goals').value) || 0; item.pj = document.getElementById('g-pj').value; }
            else if (type === 'clasificacion') { 
                item.team = document.getElementById('c-team').value; 
                item.pts = parseInt(document.getElementById('c-pts').value) || 0; 
                item.pj = document.getElementById('c-pj').value; 
                item.money = document.getElementById('c-money').value; 
                item.form = document.getElementById('c-form').value.slice(-5); 
            }
            else if (type === 'calendario') { item.e1 = document.getElementById('cal-e1').value; item.e2 = document.getElementById('cal-e2').value; item.hora = document.getElementById('cal-hora').value; }
            else if (type === 'clausulazos') { item.title = "NOTICIA"; item.body = document.getElementById('cl-text').value; }
            if (idx === "") (type === 'clausulazos') ? globalData[type].unshift(item) : globalData[type].push(item);
            render(); closeModals(); sync();
        }

        function deleteItem(type, index) { if(confirm("¿?")) { globalData[type].splice(index, 1); render(); sync(); } }

        function getFormHtml(formStr) {
            if(!formStr) return "";
            let html = '<div class="form-dots">';
            formStr.split('').forEach(char => {
                let cls = char.toUpperCase() === 'V' ? 'dot-v' : char.toUpperCase() === 'D' ? 'dot-d' : 'dot-e';
                let icon = char.toUpperCase() === 'V' ? '✓' : char.toUpperCase() === 'D' ? '✕' : '-';
                html += `<div class="dot ${cls}">${icon}</div>`;
            });
            html += '</div>';
            return html;
        }

        function render() {
            const disp = isAdmin ? 'inline-block' : 'none';
            let gHtml = `<table><tr><th>NOMBRE</th><th>G</th><th>PJ</th><th></th></tr>`;
            [...globalData.goleadores].sort((a, b) => b.goals - a.goals).forEach((i) => {
                const oi = globalData.goleadores.indexOf(i);
                gHtml += `<tr><td>${i.name}</td><td style="color:#ff00ea; font-weight:bold;">${i.goals}</td><td>${i.pj}</td>
                <td><div class="admin-controls" style="display:${disp}"><span class="btn-mini btn-edit" onclick="openEditModal('goleadores', ${oi})">✎</span><span class="btn-mini btn-del" onclick="deleteItem('goleadores', ${oi})">X</span></div></td></tr>`;
            });
            document.getElementById('goleadores-table').innerHTML = gHtml + `</table>`;

            let cHtml = `<table><tr><th>EQUIPO</th><th>PTS</th><th>PJ</th><th>ÚLTIMOS 5</th><th>DINERO</th><th></th></tr>`;
            [...globalData.clasificacion].sort((a, b) => b.pts - a.pts).forEach((i) => {
                const oi = globalData.clasificacion.indexOf(i);
                cHtml += `<tr><td>${i.team}</td><td style="color:#ff00ea; font-weight:bold;">${i.pts}</td><td>${i.pj}</td><td>${getFormHtml(i.form)}</td><td class="dinero-txt">${i.money || '0€'}</td>
                <td><div class="admin-controls" style="display:${disp}"><span class="btn-mini btn-edit" onclick="openEditModal('clasificacion', ${oi})">✎</span><span class="btn-mini btn-del" onclick="deleteItem('clasificacion', ${oi})">X</span></div></td></tr>`;
            });
            document.getElementById('clasificacion-table').innerHTML = cHtml + `</table>`;

            let calHtml = `<table><tr><th>PARTIDO</th><th>DIA</th><th></th></tr>`;
            globalData.calendario.forEach((c, idx) => {
                calHtml += `<tr><td>${c.e1} <span class="vs">VS</span> ${c.e2}</td><td>${c.hora}</td>
                <td><div class="admin-controls" style="display:${disp}"><span class="btn-mini btn-edit" onclick="openEditModal('calendario', ${idx})">✎</span><span class="btn-mini btn-del" onclick="deleteItem('calendario', ${idx})">X</span></div></td></tr>`;
            });
            document.getElementById('calendario-table').innerHTML = calHtml + `</table>`;

            let clHtml = '';
            globalData.clausulazos.forEach((cl, idx) => {
                clHtml += `<div class="clausulazo-item">
                    <div style="font-weight:bold; color:#ff00ea; font-size:0.7rem;">NOTICIA</div>
                    <div style="font-size:0.85rem; margin: 4px 0;">${cl.body}</div>
                    <div class="admin-controls" style="display:${disp}"><span class="btn-mini btn-edit" onclick="openEditModal('clausulazos', ${idx})">✎</span><span class="btn-mini btn-del" onclick="deleteItem('clausulazos', ${idx})">X</span></div>
                </div>`;
            });
            document.getElementById('clausulazos-list').innerHTML = clHtml || 'Sin noticias';
        }

        function openModal(id) { closeModals(); document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function toggleView() {
            const container = document.getElementById('main-container');
            container.classList.toggle('mobile-mode');
            document.getElementById('toggle-view-btn').innerText = container.classList.contains('mobile-mode') ? "MODO IPAD" : "MODO MÓVIL";
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
